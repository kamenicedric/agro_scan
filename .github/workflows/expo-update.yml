name: Publish Expo Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: expo-update-production
  cancel-in-progress: true

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS update
        run: npx eas-cli update --branch production --message "CI update ${GITHUB_SHA}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "1"
